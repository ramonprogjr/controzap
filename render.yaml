# Blueprint Render — ControlZap (GestorZap)
# https://render.com/docs/blueprint-spec
#
# IMPORTANTE: branch deve ser main (não controlzap).
# Preencha secrets no Dashboard. Marque NEXT_PUBLIC_* como "Available during build".

services:
  - type: web
    name: controlzap
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://ncvwocdinqudlgivnmpz.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: USE_REDIS
        value: "false"
      - key: REDIS_URL
        sync: false
      - key: REDIS_NAMESPACE
        value: production
      - key: UAZAPI_WEBHOOK_SECRET
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true

  - type: cron
    name: controlzap-broadcast-pipelines
    runtime: node
    plan: free
    schedule: "* * * * *"
    buildCommand: npm ci
    startCommand: node scripts/run-broadcast-cron.mjs
    envVars:
      - key: CRON_SECRET
        fromService:
          type: web
          name: controlzap
          envVarKey: CRON_SECRET
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          type: web
          name: controlzap
          envVarKey: NEXT_PUBLIC_APP_URL
